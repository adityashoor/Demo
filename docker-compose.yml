version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: labour_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: labour_platform
      JWT_SECRET: change-this-in-production-please
      FRONTEND_URL: http://localhost:4200
      # WhatsApp (Meta Business API)
      WHATSAPP_TOKEN: ""
      WHATSAPP_PHONE_NUMBER_ID: ""
      WHATSAPP_VERIFY_TOKEN: "labour-platform-verify-token"
      # IVR (Exotel)
      EXOTEL_API_KEY: ""
      EXOTEL_API_TOKEN: ""
      EXOTEL_SID: ""
      PLATFORM_PHONE_NUMBER: ""
      API_BASE_URL: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
